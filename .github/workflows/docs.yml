name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs]
      - name: Build docs
        run: mkdocs build --strict
