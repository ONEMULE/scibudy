name: Publish Python

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: vars.PYPI_TRUSTED_PUBLISHING_ENABLED == 'true'
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[release]
      - name: Build package
        run: python -m build
      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
  publish-token:
    runs-on: ubuntu-latest
    if: vars.PYPI_TRUSTED_PUBLISHING_ENABLED != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[release]
      - name: Build package
        run: python -m build
      - name: Publish to PyPI via API token when configured
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "Skipping PyPI publish because PYPI_API_TOKEN is not configured."
            exit 0
          fi
          python -m pip install twine
          python -m twine upload dist/*
